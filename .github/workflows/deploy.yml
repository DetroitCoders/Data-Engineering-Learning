# This is a basic workflow to help you get started with Actions

name: Deploy to GitHub Pages

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  
  # Triggers the workflow from preceding workflows in the chain
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
          ## Add and uncomment any environment variables here
          EVIDENCE_SOURCE__BIGQUERY_CONNECTION__AUTHENTICATOR: ${{ secrets.EVIDENCE_SOURCE__BIGQUERY_CONNECTION__AUTHENTICATOR }}
          EVIDENCE_SOURCE__BIGQUERY_CONNECTION__CLIENT_EMAIL: ${{ secrets.EVIDENCE_SOURCE__BIGQUERY_CONNECTION__CLIENT_EMAIL }}
          EVIDENCE_SOURCE__BIGQUERY_CONNECTION__LOCATION: ${{ secrets.EVIDENCE_SOURCE__BIGQUERY_CONNECTION__LOCATION }}
          EVIDENCE_SOURCE__BIGQUERY_CONNECTION__PRIVATE_KEY: ${{ secrets.EVIDENCE_SOURCE__BIGQUERY_CONNECTION__PRIVATE_KEY }}
          EVIDENCE_SOURCE__BIGQUERY_CONNECTION__PROJECT_ID: ${{ secrets.EVIDENCE_SOURCE__BIGQUERY_CONNECTION__PROJECT_ID }}
          EVIDENCE_SECRET_DATASET_ID: ${{ secrets.EVIDENCE_SECRET_DATASET_ID }}
          EVIDENCE_SECRET_PROJECT_ID: ${{ secrets.EVIDENCE_SECRET_PROJECT_ID }}
          EVIDENCE_SECRET_TABLE_NAME: ${{ secrets.EVIDENCE_SECRET_TABLE_NAME }}
        run: |
          npm run sources
          npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/${{ github.event.repository.name }}'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
